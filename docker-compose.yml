# ─────────────────────────────────────────────────────────────
# ConversaHub — Production Docker Compose
#
# Services:
#   postgres  — Persistent relational database (replaces SQLite)
#   redis     — Cache & refresh token store
#   backend   — FastAPI app (uvicorn, 4 workers)
#   frontend  — Next.js SSR app
# ─────────────────────────────────────────────────────────────

version: "3.9"

networks:
  conversahub:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: conversahub_postgres
    restart: unless-stopped
    networks:
      - conversahub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-conversahub_db}
      POSTGRES_USER:     ${POSTGRES_USER:-conversahub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conversahub_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conversahub} -d ${POSTGRES_DB:-conversahub_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: conversahub_redis
    restart: unless-stopped
    networks:
      - conversahub
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Backend (FastAPI) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conversahub_backend
    restart: unless-stopped
    networks:
      - conversahub
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_db
    environment:
      ENVIRONMENT:          production
      DATABASE_PROVIDER:    postgres
      POSTGRES_SERVER:      postgres
      POSTGRES_PORT:        5432
      POSTGRES_DB:          ${POSTGRES_DB:-conversahub_db}
      POSTGRES_USER:        ${POSTGRES_USER:-conversahub}
      POSTGRES_PASSWORD:    ${POSTGRES_PASSWORD:-conversahub_password}
      REDIS_HOST:           redis
      REDIS_PORT:           6379
      SECRET_KEY:           ${SECRET_KEY:-change_me_in_production_use_openssl_rand_hex_32}
      GEMINI_API_KEY:       ${GEMINI_API_KEY:-}
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Next.js) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: conversahub_frontend
    restart: unless-stopped
    networks:
      - conversahub
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
