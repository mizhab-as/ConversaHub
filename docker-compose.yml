version: '3.8'

services:
  db:
    image: pgvector/pgvector:16-pgdg
    container_name: conversahub-db
    restart: always
    environment:
      POSTGRES_USER: conversahub
      POSTGRES_PASSWORD: conversahub_password
      POSTGRES_DB: conversahub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conversahub -d conversahub_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: conversahub-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
